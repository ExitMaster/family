<script>
/* 정적 호스팅용 저장소: 기존 앱 로직을 그대로 두고 localStorage 기반으로 window.storage 제공 */
window.storage = {
  async get(key){ try{ const value = localStorage.getItem(key); return value == null ? null : { value }; }catch(e){ return null; } },
  async set(key, value){ try{ localStorage.setItem(key, value); }catch(e){ console.error('저장 실패', e); } }
};

<script>
/* ===== 방학 데일리 루틴 앱 =====

const STORAGE_KEY = 'holiday_routine_v3';

const DEFAULT_KIDS = {
  big: {
    name: '이누',
    img: window.IMG_DEUNDEUN,  // 모자 쓴 아이
    color: '#00B8A0',          // 비비드 틸
    color2: '#FF8A3D',         // 옷 주황 포인트
    tasks: [

    color2: '#FF7EB3',

/* 성장 단계: 별 개수 → 캐릭터 크기·광채·왕관 */
const STAGES = [
  { min: 0,  name: '새싹',   scale: 0.72, glow: 0,  crown: '' },
  { min: 3,  name: '무럭무럭', scale: 0.82, glow: 1,  crown: '' },

];

/* 아이별 여름방학 기간 (start=방학 첫날, schoolStart=개학일) */
const VACATION = {
  big:   { start: '2026-07-27', schoolStart: '2026-08-21' }, // 이누
  small: { start: '2026-07-22', schoolStart: '2026-08-11' }, // 든든이
};

function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function weekDates(){ const out=[],d=new Date(); for(let i=6;i>=0;i--){const x=new Date(d);x.setDate(d.getDate()-i);out.push(`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`);} return out; }
/* 'YYYY-MM-DD' → 일수(정수). UTC 기준이라 시간대·서머타임 영향 없음 */
function ymdToDays(s){ const [y,m,d]=s.split('-').map(Number); return Math.floor(Date.UTC(y,m-1,d)/86400000); }
/* 아이별 방학 진행 상황 문구 */
function vacationInfo(kidId){
  const v=VACATION[kidId]; if(!v) return '';
  const t=ymdToDays(todayKey()), s=ymdToDays(v.start), sc=ymdToDays(v.schoolStart);
  let label, cls='';
  if(t<s){ label=`방학까지 ${s-t}일`; cls='before'; }
  else if(t>=sc){ label='개학했어요 🎒'; cls='ended'; }
  else { label=`방학 ${t-s+1}일째 · 개학까지 ${sc-t}일`; }
  return `<div class="vacation ${cls}">🏖️ ${label}</div>`;
}

let state=null, parentMode=false, editingKid=null, darkMode=false;

async function loadState(){
  try{ const r=await window.storage.get(STORAGE_KEY); if(r&&r.value){
    const s=JSON.parse(r.value);
    // 이미지·색상은 항상 최신 기본값으로 갱신(용량/변경 대응)
    for(const id of ['big','small']){
      if(s.kids[id]){ s.kids[id].img=DEFAULT_KIDS[id].img; s.kids[id].color=DEFAULT_KIDS[id].color; s.kids[id].color2=DEFAULT_KIDS[id].color2; }
    }
    return s;
  }}catch(e){}
  return { kids:JSON.parse(JSON.stringify(DEFAULT_KIDS)), progress:{big:{},small:{}}, stars:{big:0,small:0} };
}
async function saveState(){ try{ await window.storage.set(STORAGE_KEY, JSON.stringify(state)); }catch(e){ console.error(e); } }

/* 최근 14일치만 남기고 오래된 progress 정리 (저장 용량 관리) */
function pruneOldProgress(){
  const keep=new Set();
  const d=new Date();
  for(let i=0;i<14;i++){ const x=new Date(d); x.setDate(d.getDate()-i);
    keep.add(`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`); }
  for(const id of ['big','small']){
    if(!state.progress[id]) continue;
    for(const dk of Object.keys(state.progress[id])){ if(!keep.has(dk)) delete state.progress[id][dk]; }
  }
}

function dayProgress(kidId){ const k=todayKey(); if(!state.progress[kidId][k]) state.progress[kidId][k]={checked:{},confirmed:{}}; return state.progress[kidId][k]; }
function stageFor(kidId){ const s=state.stars[kidId]||0; let cur=STAGES[0]; for(const st of STAGES) if(s>=st.min) cur=st; return cur; }

function render(){
  const root=document.getElementById('root');
  root.innerHTML=`
    <div class="app">
      <header class="top">
        <div class="brand">
          <span class="logo">🏕️</span>
          <div><h1>우리집 방학 루틴</h1><p class="date">${prettyDate()}</p></div>
        </div>
        <div class="top-actions">
          <button class="theme-toggle" onclick="toggleDark()" aria-label="${darkMode?'라이트 모드로':'다크 모드로'}">${darkMode?'☀️':'🌙'}</button>
          <button class="parent-toggle ${parentMode?'on':''}" onclick="toggleParent()">
            ${parentMode?'👀 아이 화면으로':'🔧 부모 모드'}
          </button>
        </div>
      </header>
      <div class="split">${panel('big')}${panel('small')}</div>
      <footer class="foot">아이가 체크하면 부모가 확인해 별을 줍니다 · 매일 초기화되고 한 주 기록은 남아요</footer>
    </div>
    ${editingKid?editModal(editingKid):''}`;
}
function prettyDate(){ const days=['일','월','화','수','목','금','토']; const d=new Date(); return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }

function panel(kidId){
  const kid=state.kids[kidId];
  const prog=state.progress[kidId][todayKey()]||{checked:{},confirmed:{}};
  const stage=stageFor(kidId);
  const done=kid.tasks.filter(t=>prog.checked[t.id]).length;
  const total=kid.tasks.length, pct=total?Math.round(done/total*100):0;
  return `
  <section class="panel" style="--accent:${kid.color};--accent2:${kid.color2}">
    <div class="creature-card">
      <div class="avatar-wrap glow-${stage.glow}">
        ${stage.crown?`<span class="crown">${stage.crown}</span>`:''}
        <img class="avatar" src="${kid.img}" style="transform:scale(${stage.scale})" alt="${escapeHtml(kid.name)}"/>
      </div>
      <div class="creature-info">
        <div class="kid-name">${escapeHtml(kid.name)}</div>
        <div class="stage-badge"><span class="stage-name">${stage.name}</span><span class="stage-star">⭐ ${state.stars[kidId]||0}</span></div>
      </div>
      ${parentMode?`<button class="edit-btn" onclick="openEdit('${kidId}')">편집</button>`:''}
    </div>
    ${vacationInfo(kidId)}
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-text">오늘 ${done}/${total}</span>
    </div>
    <div class="tasks">${kid.tasks.map(t=>taskRow(kidId,t,prog)).join('')}</div>
    ${weekStrip(kidId)}
  </section>`;
}
function taskRow(kidId,t,prog){
  const checked=!!prog.checked[t.id], confirmed=!!prog.confirmed[t.id];
  return `
  <div class="task ${checked?'checked':''} ${confirmed?'confirmed':''}">
    <button class="check" onclick="toggleCheck('${kidId}','${t.id}')" aria-label="완료">${confirmed?'⭐':(checked?'✔':'')}</button>
    <span class="task-icon">${escapeHtml(t.icon)}</span>
    <span class="task-label">${escapeHtml(t.label)}</span>
    ${parentMode&&checked&&!confirmed?`<button class="confirm" onclick="confirmTask('${kidId}','${t.id}')">확인 ✓</button>`:''}
    ${confirmed?'<span class="badge">확인됨</span>':''}
  </div>`;
}
function weekStrip(kidId){
  const dates=weekDates();
  const cells=dates.map(dk=>{
    const p=state.progress[kidId][dk], kid=state.kids[kidId]; let cls='w-empty';
    if(p){ const c=kid.tasks.filter(t=>p.confirmed[t.id]).length; const r=kid.tasks.length?c/kid.tasks.length:0;
      if(r>=1)cls='w-full'; else if(r>=0.5)cls='w-mid'; else if(r>0)cls='w-low'; }
    const isToday=dk===todayKey();
    const day=['일','월','화','수','목','금','토'][new Date(dk+'T00:00').getDay()];
    return `<div class="wcell ${cls} ${isToday?'w-today':''}"><span>${day}</span></div>`;
  }).join('');
  return `<div class="week"><div class="week-label">이번 주</div><div class="week-row">${cells}</div></div>`;
}
function editModal(kidId){
  const kid=state.kids[kidId];
  return `
  <div class="modal-bg" onclick="closeEditBg(event)">
    <div class="modal">
      <div class="modal-head"><h2>${escapeHtml(kid.name)} 할 일 편집</h2><button class="x" onclick="closeEdit()">✕</button></div>
      <div class="name-edit">
        <label>이름</label>
        <div class="row"><input id="kname" value="${escapeHtml(kid.name)}" maxlength="10"/><button onclick="saveKidMeta('${kidId}',this)">저장</button></div>
      </div>
      <div class="edit-list">
        ${kid.tasks.map((t,i)=>`
          <div class="edit-row">
            <div class="move">
              <button class="mv" onclick="moveTask('${kidId}','${t.id}',-1)" ${i===0?'disabled':''} aria-label="위로 이동">▲</button>
              <button class="mv" onclick="moveTask('${kidId}','${t.id}',1)" ${i===kid.tasks.length-1?'disabled':''} aria-label="아래로 이동">▼</button>
            </div>
            <input class="ei-icon" id="ic_${t.id}" value="${escapeHtml(t.icon)}" maxlength="2"/>
            <input class="ei-label" id="lb_${t.id}" value="${escapeHtml(t.label)}"/>
            <button class="save-task" onclick="saveTask('${kidId}','${t.id}',this)">✓</button>
            <button class="del-task" onclick="deleteTask('${kidId}','${t.id}')">🗑</button>
          </div>`).join('')}
      </div>
      <div class="add-row">
        <input class="ei-icon" id="new_icon" placeholder="📌" maxlength="2"/>
        <input class="ei-label" id="new_label" placeholder="새 할 일 추가..."/>
        <button class="add-task" onclick="addTask('${kidId}')">＋ 추가</button>
      </div>
    </div>
  </div>`;
}
function toggleParent(){ parentMode=!parentMode; render(); }
function applyTheme(){ document.documentElement.setAttribute('data-theme', darkMode?'dark':'light'); }
async function toggleDark(){ darkMode=!darkMode; state.dark=darkMode; applyTheme(); await saveState(); render(); }
async function toggleCheck(kidId,taskId){ if(parentMode)return; const p=dayProgress(kidId); if(p.confirmed[taskId])return; p.checked[taskId]=!p.checked[taskId]; await saveState(); render(); }
async function confirmTask(kidId,taskId){ const p=dayProgress(kidId); if(p.checked[taskId]&&!p.confirmed[taskId]){ p.confirmed[taskId]=true; state.stars[kidId]=(state.stars[kidId]||0)+1; await saveState(); render(); } }
function openEdit(kidId){ editingKid=kidId; render(); }
function closeEdit(){ editingKid=null; render(); }
function closeEditBg(e){ if(e.target.classList.contains('modal-bg')) closeEdit(); }
/* 편집 모달만 다시 그려 다른 입력칸 내용이 날아가지 않게 함 */
function rerenderModal(){
  const bg=document.querySelector('.modal-bg');
  if(bg && editingKid){ bg.outerHTML=editModal(editingKid); }
  else render();
}
function flashSaved(btn){ if(!btn)return; const o=btn.textContent; btn.textContent='✓ 저장됨'; btn.disabled=true;
  setTimeout(()=>{ try{ btn.textContent=o; btn.disabled=false; }catch(e){} }, 900); }
async function saveKidMeta(kidId,btn){ const n=document.getElementById('kname').value.trim(); if(n)state.kids[kidId].name=n; await saveState(); flashSaved(btn); }
async function saveTask(kidId,taskId,btn){ const icon=document.getElementById('ic_'+taskId).value.trim(); const label=document.getElementById('lb_'+taskId).value.trim(); const t=state.kids[kidId].tasks.find(x=>x.id===taskId); if(t){if(icon)t.icon=icon; if(label)t.label=label;} await saveState(); flashSaved(btn); }
async function deleteTask(kidId,taskId){ state.kids[kidId].tasks=state.kids[kidId].tasks.filter(x=>x.id!==taskId); await saveState(); rerenderModal(); }
/* 할 일 순서 이동: dir=-1 위로, dir=+1 아래로 */
async function moveTask(kidId,taskId,dir){ const tasks=state.kids[kidId].tasks; const i=tasks.findIndex(x=>x.id===taskId); const j=i+dir; if(i<0||j<0||j>=tasks.length)return; [tasks[i],tasks[j]]=[tasks[j],tasks[i]]; await saveState(); rerenderModal(); }
async function addTask(kidId){ const icon=document.getElementById('new_icon').value.trim()||'📌'; const label=document.getElementById('new_label').value.trim(); if(!label)return; state.kids[kidId].tasks.push({id:'x'+Date.now(),icon,label}); await saveState(); rerenderModal(); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

(async function init(){
  state=await loadState(); pruneOldProgress();
  /* 저장된 테마 우선, 없으면 시스템 설정을 따름 */
  if(typeof state.dark==='boolean') darkMode=state.dark;
  else darkMode = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  applyTheme();
  render(); await saveState();
})();
</script>
