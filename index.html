<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카피바라 숙제 탐험대</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; height:100%; overscroll-behavior:none; }
@keyframes capyBob { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-0.07em) rotate(0.3deg)} }
@keyframes capyFloat { 0%,100%{transform:translateY(0) rotate(-1.6deg)} 50%{transform:translateY(-0.12em) rotate(1.6deg)} }
@keyframes capyNap { 0%,100%{transform:scale(1.0,1.0)} 50%{transform:scale(1.02,0.98)} }
@keyframes capySpark { 0%,100%{opacity:.35; transform:scale(.85)} 50%{opacity:1; transform:scale(1.15)} }
@keyframes capyPop { 0%{transform:scale(0.6); opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1); opacity:1} }
@keyframes confettiFall { 0%{transform:translateY(-30px) rotate(0deg); opacity:1} 100%{transform:translateY(420px) rotate(420deg); opacity:0} }
@keyframes lilyDrift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes tapPop { 0%{transform:scale(1)} 50%{transform:scale(0.93)} 100%{transform:scale(1)} }
.tapbtn:active { animation: tapPop 0.25s ease; }
::-webkit-scrollbar { width:0; height:0; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Color utilities ──────────────────────────────────────────
function _mix(hex, amt, toWhite) {
  try {
    const h = hex.replace('#','');
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    const f = c => { const v = toWhite ? Math.round(c+(255-c)*amt) : Math.round(c*(1-amt)); return Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0'); };
    return '#'+f(r)+f(g)+f(b);
  } catch(e) { return hex; }
}
const lighten = (h,a) => _mix(h,a,true);
const darken  = (h,a) => _mix(h,a,false);

// ── Capybara renderer (parametric SVG) ───────────────────────
//  MOODS의 face/pose 힌트를 실제 그림 파라미터로 옮긴 사양표.
//  눈(eye)·입(mouth)·볼(blush)·자세(pose)·부가연출(extra)을 조합해
//  한 마리의 공통 카피바라에서 표정/포즈 변형을 만든다.
const MOOD_ART = {
  '평온':  {eye:'happy',     mouth:'smile_s',    blush:.35, pose:'calm'},
  '행복':  {eye:'happy',     mouth:'smile_open', blush:.6,  pose:'bounce'},
  '졸림':  {eye:'closed',    mouth:'small',      blush:.30, pose:'lean',     extra:'zzz'},
  '신남':  {eye:'star',      mouth:'open_big',   blush:.5,  pose:'jump',     extra:'spark'},
  '놀람':  {eye:'wide',      mouth:'o',          blush:.30, pose:'jolt'},
  '부끄럼':{eye:'happy',     mouth:'small',      blush:.85, pose:'duck'},
  '먹는중':{eye:'happy',     mouth:'chew',       blush:.45, pose:'calm'},
  '뿌듯':  {eye:'confident', mouth:'smile_s',    blush:.40, pose:'proud',    extra:'spark'},
  '토라짐':{eye:'side',      mouth:'pout',       blush:.30, pose:'turn',     extra:'angry'},
  '장난':  {eye:'wink',      mouth:'tongue',     blush:.40, pose:'mischief'},
  '도도':  {eye:'half',      mouth:'smile_s',    blush:.25, pose:'chinup'},
  '두근':  {eye:'sparkle',   mouth:'small',      blush:.70, pose:'calm',     extra:'heart'},
  '안심':  {eye:'closed',    mouth:'smile_s',    blush:.35, pose:'relax',    extra:'sigh'},
  '_default':{eye:'round',   mouth:'smile_s',    blush:.40, pose:'calm'}
};
// 개성 → 평상시(이벤트가 없을 때) 기본 표정·눈 크기. 개성별 '생김새'가 도감/연못에서 드러난다.
const PERSONALITY_REST = {'느긋':'평온','장난꾸러기':'장난','새침':'도도','호기심':'두근','겁쟁이':'부끄럼'};
const PERSONALITY_EYE  = {'호기심':1.18,'겁쟁이':1.12,'장난꾸러기':1.06};
const POSE_TF = {calm:'',bounce:'',jump:'',jolt:'',lean:'rotate(-7 50 70)',duck:'translate(0 4)',proud:'translate(0 -2)',turn:'translate(100 0) scale(-1 1)',mischief:'rotate(5 50 70)',chinup:'rotate(-4 50 66)',relax:'rotate(4 50 70)'};
const EXTRA_ART = {
  zzz:  '<text x="71" y="27" font-size="15">💤</text>',
  spark:'<text x="14" y="27" font-size="13">✨</text>',
  heart:'<text x="59" y="15" font-size="15">💗</text>',
  angry:'<text x="69" y="25" font-size="14">💢</text>',
  sigh: '<text x="69" y="73" font-size="12">💨</text>'
};

function capy({size=90, color='#c79a68', accessory='', idle='bob', status='healthy', rarity='일반', mood=null, personality=null, decor=null}) {
  const animMap = { bob:'capyBob 2.8s ease-in-out infinite', float:'capyFloat 4.2s ease-in-out infinite', nap:'capyNap 3.4s ease-in-out infinite', none:'none' };
  const sm = { healthy:{f:'none',o:1,e:''}, weak:{f:'saturate(0.7) brightness(0.99)',o:0.95,e:'😟'}, leaving:{f:'grayscale(0.45) brightness(0.98)',o:0.9,e:'😢'}, gone:{f:'grayscale(0.9) brightness(1.02)',o:0.4,e:'💨'}, locked:{f:'grayscale(1) brightness(0.5) contrast(0.7)',o:0.85,e:''} }[status] || {f:'none',o:1,e:''};
  const base = status==='locked' ? '#9aa0a6' : color;
  const ink='#3a2a1d';
  const oc=darken(base,0.46), earIn=darken(base,0.20), muz=lighten(base,0.12), nz=darken(base,0.50), nzd=darken(base,0.62), foot=darken(base,0.07);
  const anim = status==='gone' ? 'none' : (animMap[idle]||animMap.bob);
  const isGlasses = accessory==='👓';
  const acc = status==='locked' ? '' : accessory;
  const sparkle = (rarity==='영웅'||rarity==='전설') && status!=='locked';

  // 표정 사양 결정: 위기 상태 > 명시 mood > 낮잠 > 개성 평상시 > 기본
  let art;
  if(status==='gone')         art={eye:'closed',  mouth:'small', blush:.15, pose:'relax'};
  else if(status==='leaving') art={eye:'sad',     mouth:'frown', blush:.20, pose:'duck'};
  else if(status==='weak')    art={eye:'worried', mouth:'frown', blush:.25, pose:'calm'};
  else { const m = mood || (idle==='nap'?'졸림':null) || PERSONALITY_REST[personality]; art = MOOD_ART[m] || MOOD_ART._default; }
  const sc = PERSONALITY_EYE[personality] || 1;
  const pose = POSE_TF[art.pose] || '';

  function eye(type, cx, cy, side){
    const hl = `<circle cx="${cx-1.6}" cy="${cy-2}" r="1.5" fill="#fff" opacity="0.92"/>`;
    switch(type){
      case 'round':   return `<ellipse cx="${cx}" cy="${cy}" rx="${5*sc}" ry="${6.2*sc}" fill="${ink}"/>${hl}`;
      case 'wide':    return `<ellipse cx="${cx}" cy="${cy}" rx="${6.2*sc}" ry="${7.2*sc}" fill="#fff" stroke="${ink}" stroke-width="1.4"/><circle cx="${cx}" cy="${cy+0.5}" r="${3*sc}" fill="${ink}"/>${hl}`;
      case 'happy':   return `<path d="M ${cx-5.5} ${cy+1.8} Q ${cx} ${cy-5} ${cx+5.5} ${cy+1.8}" fill="none" stroke="${ink}" stroke-width="2.4" stroke-linecap="round"/>`;
      case 'closed':  return `<path d="M ${cx-5} ${cy-0.5} Q ${cx} ${cy+4.5} ${cx+5} ${cy-0.5}" fill="none" stroke="${ink}" stroke-width="2.2" stroke-linecap="round"/>`;
      case 'star':    return `<path d="M ${cx} ${cy-6.5} L ${cx+1.7} ${cy-1.7} L ${cx+6.5} ${cy} L ${cx+1.7} ${cy+1.7} L ${cx} ${cy+6.5} L ${cx-1.7} ${cy+1.7} L ${cx-6.5} ${cy} L ${cx-1.7} ${cy-1.7} Z" fill="${ink}"/><circle cx="${cx-1}" cy="${cy-1.5}" r="1.1" fill="#fff" opacity="0.85"/>`;
      case 'sparkle': return `<ellipse cx="${cx}" cy="${cy}" rx="${5.2*sc}" ry="${6.4*sc}" fill="${ink}"/><circle cx="${cx-1.6}" cy="${cy-2}" r="2" fill="#fff" opacity="0.95"/><circle cx="${cx+1.8}" cy="${cy+1.8}" r="1" fill="#fff" opacity="0.8"/>`;
      case 'confident': return `<path d="M ${cx-5} ${cy+1} A 5 5 0 0 0 ${cx+5} ${cy+1} Z" fill="${ink}"/><path d="M ${cx-5} ${cy-3} L ${cx+5} ${cy-4.5}" fill="none" stroke="${ink}" stroke-width="1.5" stroke-linecap="round"/>`;
      case 'side':    return `<ellipse cx="${cx}" cy="${cy}" rx="5" ry="4" fill="#fff" stroke="${ink}" stroke-width="1.2"/><circle cx="${cx+2.4}" cy="${cy}" r="2.4" fill="${ink}"/>`;
      case 'half':    return `<path d="M ${cx-5} ${cy-1.5} L ${cx+5} ${cy-3}" fill="none" stroke="${ink}" stroke-width="2.2" stroke-linecap="round"/><path d="M ${cx-4} ${cy} Q ${cx} ${cy+2.5} ${cx+4} ${cy-0.5}" fill="none" stroke="${ink}" stroke-width="1.5" stroke-linecap="round"/>`;
      case 'sad':     return `<path d="M ${cx-4.5} ${cy-2} Q ${cx} ${cy+2.5} ${cx+4.5} ${cy-2}" fill="none" stroke="${ink}" stroke-width="2.2" stroke-linecap="round"/>${side<0?`<circle cx="${cx-4}" cy="${cy+5}" r="1.8" fill="#9ad0e6"/>`:''}`;
      case 'worried': return `<ellipse cx="${cx}" cy="${cy+0.5}" rx="3.6" ry="4.4" fill="${ink}"/><path d="M ${cx-side*4} ${cy-5} L ${cx+side*5} ${cy-3}" fill="none" stroke="${ink}" stroke-width="1.6" stroke-linecap="round"/>`;
      default:        return `<ellipse cx="${cx}" cy="${cy}" rx="${5*sc}" ry="${6*sc}" fill="${ink}"/>${hl}`;
    }
  }
  function mouth(type){
    switch(type){
      case 'smile_s':    return `<path d="M 44 80 Q 50 85 56 80" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/>`;
      case 'smile_open': return `<path d="M 43 79 Q 50 89 57 79 Z" fill="#9c4a4a"/><path d="M 45 82 Q 50 86 55 82 Z" fill="#ef7d8e"/>`;
      case 'o':          return `<ellipse cx="50" cy="81" rx="3.2" ry="3.8" fill="#9c4a4a"/>`;
      case 'open_big':   return `<ellipse cx="50" cy="82" rx="5" ry="6" fill="#9c4a4a"/><ellipse cx="50" cy="84.5" rx="3.2" ry="2.6" fill="#ef7d8e"/>`;
      case 'chew':       return `<path d="M 44 80 Q 50 84 56 80" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/><circle cx="61" cy="78" r="1.8" fill="#8fbf6a"/>`;
      case 'pout':       return `<path d="M 45 83 Q 50 79 55 83" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/>`;
      case 'tongue':     return `<path d="M 44 80 Q 50 84 56 80" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/><path d="M 48 81 Q 50 87 53 81 Z" fill="#ef7d8e"/>`;
      case 'small':      return `<line x1="47" y1="80" x2="53" y2="80" stroke="${ink}" stroke-width="1.6" stroke-linecap="round"/>`;
      case 'frown':      return `<path d="M 44 84 Q 50 78 56 84" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/>`;
      default:           return `<path d="M 44 80 Q 50 84 56 80" fill="none" stroke="${ink}" stroke-width="1.8" stroke-linecap="round"/>`;
    }
  }

  let lt=art.eye, rt=art.eye;
  if(art.eye==='wink'){ lt='happy'; rt='round'; }   // 한쪽 눈 윙크
  const eyes = eye(lt,35,50,-1) + eye(rt,65,50,1);
  // 꾸미기 장식(해금·수집으로 얻는다). hat 슬롯은 종족 모자 악세서리를 대체한다.
  const dec = (status==='locked') ? null : decor;
  const decHat = dec && dec.slot==='hat';
  const showAcc = acc && !(decHat && !isGlasses);
  const accSvg = showAcc ? (isGlasses
      ? `<text x="50" y="55" font-size="22" text-anchor="middle">${acc}</text>`
      : `<text x="50" y="14" font-size="20" text-anchor="middle">${acc}</text>`) : '';
  const decSvg = dec ? ({
      hat:   `<text x="50" y="15" font-size="20" text-anchor="middle">${dec.emoji}</text>`,
      neck:  `<text x="50" y="97" font-size="15" text-anchor="middle">${dec.emoji}</text>`,
      badge: `<text x="34" y="94" font-size="13" text-anchor="middle">${dec.emoji}</text>`,
      side:  `<text x="85" y="32" font-size="14" text-anchor="middle">${dec.emoji}</text>`
    }[dec.slot] || `<text x="50" y="15" font-size="18" text-anchor="middle">${dec.emoji}</text>`) : '';
  const extraSvg = (status==='healthy' && art.extra) ? (EXTRA_ART[art.extra]||'') : '';

  return `<div style="position:relative;display:inline-block;font-size:${size}px;line-height:1;opacity:${sm.o};filter:${sm.f};">
  ${sparkle?`<div style="position:absolute;top:-0.05em;right:-0.05em;font-size:0.46em;animation:capySpark 1.6s ease-in-out infinite;pointer-events:none;z-index:9;">✨</div>`:''}
  <div style="position:relative;width:2em;height:2.35em;transform-origin:50% 95%;animation:${anim};">
    <svg viewBox="0 0 100 120" width="100%" height="100%" style="display:block;overflow:visible;">
      <g transform="${pose}">
        <ellipse cx="30" cy="15" rx="10" ry="9" fill="${base}" stroke="${oc}" stroke-width="2"/><ellipse cx="30" cy="16" rx="4.5" ry="4.5" fill="${earIn}"/>
        <ellipse cx="70" cy="15" rx="10" ry="9" fill="${base}" stroke="${oc}" stroke-width="2"/><ellipse cx="70" cy="16" rx="4.5" ry="4.5" fill="${earIn}"/>
        <ellipse cx="40" cy="103" rx="8" ry="5.5" fill="${foot}" stroke="${oc}" stroke-width="1.6"/>
        <ellipse cx="60" cy="103" rx="8" ry="5.5" fill="${foot}" stroke="${oc}" stroke-width="1.6"/>
        <path d="M50 12 C72 12 85 25 85 52 C85 87 70 109 50 109 C30 109 15 87 15 52 C15 25 28 12 50 12 Z" fill="${base}" stroke="${oc}" stroke-width="2"/>
        <ellipse cx="50" cy="60" rx="25" ry="33" fill="#ffffff" opacity="0.06"/>
        <ellipse cx="50" cy="72" rx="23" ry="16" fill="${muz}"/>
        <ellipse cx="28" cy="74" rx="7" ry="4.2" fill="#ef9bb0" opacity="${art.blush}"/>
        <ellipse cx="72" cy="74" rx="7" ry="4.2" fill="#ef9bb0" opacity="${art.blush}"/>
        <ellipse cx="50" cy="66" rx="11" ry="7" fill="${nz}"/>
        <ellipse cx="50" cy="63.5" rx="6" ry="2" fill="#ffffff" opacity="0.15"/>
        <ellipse cx="46" cy="66" rx="1.4" ry="2.2" fill="${nzd}"/><ellipse cx="54" cy="66" rx="1.4" ry="2.2" fill="${nzd}"/>
        <line x1="50" y1="73" x2="50" y2="78" stroke="${oc}" stroke-width="1.2" stroke-linecap="round"/>
        ${mouth(art.mouth)}
        ${eyes}
        ${accSvg}
        ${decSvg}
        ${extraSvg}
      </g>
    </svg>
  </div>
  ${sm.e ? `<div style="position:absolute;top:0.1em;left:-0.05em;font-size:0.44em;z-index:8;pointer-events:none;">${sm.e}</div>` : ''}
</div>`;
}

// ── Constants ────────────────────────────────────────────────
const THEMES = {
  onsen:    {bg:'linear-gradient(180deg,#fdf4e8,#f4e7d4)', water:'linear-gradient(180deg,#d9ece4,#bfdcd2)', card:'#fffaf2', accent:'#c97a4e', accentDark:'#a8623c', ink:'#574437', sub:'#9c8775', line:'#efe2d0', soft:'#f6ebda'},
  riverside:{bg:'linear-gradient(180deg,#eef7f4,#e0eef0)', water:'linear-gradient(180deg,#c5e6ea,#a9d8de)', card:'#ffffff', accent:'#3f9b94', accentDark:'#2f7b75', ink:'#37494a', sub:'#7b9192', line:'#dcebea', soft:'#e6f4f2'},
  sakura:   {bg:'linear-gradient(180deg,#fceef4,#f3e2ee)', water:'linear-gradient(180deg,#ecd6ea,#ddc2dd)', card:'#fff8fc', accent:'#cd7aa1', accentDark:'#b15f86', ink:'#56414f', sub:'#9c8593', line:'#f1dde9', soft:'#faecf4'}
};
const RARITY = {'일반':{c:'#9aa0a6',bg:'#eef0f2'},'희귀':{c:'#3f9b94',bg:'#e2f2f0'},'영웅':{c:'#8a6fc9',bg:'#efeafb'},'전설':{c:'#d99441',bg:'#fbf0dc'}};
const DL = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
const DAY_ORDER = ['mon','tue','wed','thu','fri','sat','sun'];
// 숙제 주기: 화요일에 받은 숙제는 수·목에, 목요일에 받은 숙제는 금·토·(다음)월에 완료한다.
// assignDow = 받는 요일의 getDay() 인덱스(일0..토6). off = 받는 날로부터의 일수.
const CYCLES = [
  {key:'tue', label:'화요일 숙제', assignDow:2, days:[{d:'wed',off:1},{d:'thu',off:2}]},
  {key:'thu', label:'목요일 숙제', assignDow:4, days:[{d:'fri',off:1},{d:'sat',off:2},{d:'mon',off:4}]}
];
// 완료(숙제)일 요일 집합. 여기에 없는 요일(화·일 등)은 '자유일'이라 자발 숙제가 가능하다.
const COMP_DAYS = CYCLES.reduce((s,cy)=>{ cy.days.forEach(x=>{s[x.d]=true;}); return s; }, {});
// ============================================================
//  카피바라 데이터셋 (개성 · 표정 · 상호작용 · 깜짝친구 · 이벤트)
//  ▸ 순수 데이터 모듈. capyMood(표정·행동) 태그가 곧 SVG 변형 '필요 목록'이 된다.
//  ▸ 향후 SVG 작업 시 MOODS의 face/pose 힌트가 그대로 변형 사양으로 쓰인다.
// ============================================================

// 1) 개성(성격) — SPECIES.personality 값과 1:1. 기분 성향과 상호작용 반응 색깔.
const PERSONALITY = {
  '느긋':      {emoji:'😌', desc:'느긋하고 평온한 성격', moodBias:['평온','졸림','행복']},
  '장난꾸러기':{emoji:'😜', desc:'장난기 많고 활발한 성격', moodBias:['신남','장난','놀람']},
  '새침':      {emoji:'😼', desc:'새침하지만 속정 깊은 성격', moodBias:['도도','부끄럼','토라짐']},
  '호기심':    {emoji:'🤓', desc:'호기심 가득한 탐험가 성격', moodBias:['놀람','신남','두근']},
  '겁쟁이':    {emoji:'🫣', desc:'겁 많고 수줍은 성격', moodBias:['부끄럼','놀람','안심']}
};

// 2) 표정·행동 태그(capyMood) — 이벤트/상호작용이 가리키는 카피바라 상태.
//    face/pose는 향후 SVG 변형 사양(눈·입·볼·자세) 힌트.
const MOODS = {
  '평온':  {emoji:'😌', face:'눈 반달, 입 옅은 미소', pose:'편안히 앉음'},
  '행복':  {emoji:'😊', face:'눈 웃음, 볼 발그레', pose:'살짝 들썩'},
  '졸림':  {emoji:'😴', face:'눈 감김, zzz', pose:'눕기 직전'},
  '신남':  {emoji:'🤩', face:'눈 반짝(별), 입 활짝', pose:'폴짝'},
  '놀람':  {emoji:'😲', face:'눈 동그래, 입 O', pose:'움찔'},
  '부끄럼':{emoji:'☺️', face:'눈 곡선, 볼 진하게', pose:'고개 숙임'},
  '먹는중':{emoji:'😋', face:'볼 오물오물', pose:'간식에 코 박기'},

  DAY_ORDER.forEach(d=>{ const pg=pages[d],mins=pg*m,cap=ST.settings.dayMin[d]||0; days[d]={pages:pg,mins,cap,fill:cap>0?Math.min(1,mins/cap):(mins>0?1:0),over:mins>cap&&cap>=0&&mins>0}; });
  return {days,weekTotal};
}
function anyCrisis(pond) { return (pond||ST.pond).some(c=>c.status!=='healthy'); }
function crisisBannerText() {
  const c=ST.pond.find(x=>x.status!=='healthy'); if(!c) return '';
  const s=sp(c.speciesId);
  return ({weak:s.name+'이(가) 기운이 없어요',leaving:s.name+'이(가) 떠나려 해요',gone:s.name+'이(가) 잠시 사라졌어요'})[c.status]||s.name+'이(가) 위기예요';
}

function h(s) { if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Date / rollover helpers ──────────────────────────────────
function dstr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dparse(s){ const p=String(s).split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function dwk(d){ return ['sun','mon','tue','wed','thu','fri','sat'][d.getDay()]; }
function dadd(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
// today 기준 가장 최근의 dow 요일 날짜(당일 포함).
function dmostRecentDow(today,dow){ const x=new Date(today.getFullYear(),today.getMonth(),today.getDate()); x.setDate(x.getDate()-((x.getDay()-dow+7)%7)); return x; }
function isFreeWk(wk){ return !COMP_DAYS[wk]; }
// today 기준 사이클의 받는날(앵커) 날짜. 이미 끝난 사이클이면 다음 주기로.
function cycleAnchor(cy,today){
  let a=dmostRecentDow(today,cy.assignDow);
  const lastOff=Math.max.apply(null,cy.days.map(x=>x.off));
  if(dstr(today)>dstr(dadd(a,lastOff))) a=dadd(a,7);
  return a;
}
// 한 사이클의 각 완료일에 해당하는 실제 날짜를 매핑.
function cycleDates(cy,today){ const a=cycleAnchor(cy,today); const map={}; cy.days.forEach(x=>{ map[x.d]=dstr(dadd(a,x.off)); }); return map; }
// 특정 요일이 특정 날짜에 푼 페이지 수(날짜 스탬프가 일치할 때만).
function doneOnDate(wk,ds){ const e=ST.dayLog&&ST.dayLog[wk]; return (e&&e.date===ds)?(e.pages||0):0; }
function doneForDay(wk){ return doneOnDate(wk,dstr(new Date())); }
// 사이클 재계산: 자유일(휴식일)에 미리 푼 분량을 풀에서 빼고, 남은 양을 완료일 순서대로 재분배.
function cycleSchedule(cy,today){
  const a=cycleAnchor(cy,today), T=dayPages(cy.key), lastOff=Math.max.apply(null,cy.days.map(x=>x.off)), todayS=dstr(today);
  let voluntaryDone=0;
  for(let o=0;o<=lastOff;o++){ const dt=dadd(a,o), wk=dwk(dt); if(isFreeWk(wk)) voluntaryDone+=doneOnDate(wk,dstr(dt)); }
  voluntaryDone=Math.min(voluntaryDone,T);
  const pool=Math.max(0,T-voluntaryDone);
  const dist=distribute(pool,cy.days.map(x=>x.d));
  const rows=cy.days.map(x=>{
    const ds=dstr(dadd(a,x.off)), required=dist[x.d]||0, doneRaw=doneOnDate(x.d,ds);
    return {wk:x.d,date:ds,required,doneRaw,done:Math.min(doneRaw,required),isPast:ds<todayS,isToday:ds===todayS};
  });
  const cycleDone=Math.min(T,voluntaryDone+rows.reduce((s,r)=>s+r.doneRaw,0));
  return {anchor:a,T,voluntaryDone,rows,cycleDone};
}
// 특정 요일(완료일)이 today 기준 어느 사이클의 어느 행인지.
function planForWeekday(wk,today){
  for(let i=0;i<CYCLES.length;i++){ const cs=cycleSchedule(CYCLES[i],today), r=cs.rows.find(x=>x.wk===wk); if(r) return {cy:CYCLES[i],cs,row:r}; }
  return null;
}
// today가 자유일이면, 미리 풀 수 있는 (남은 분량이 있는) 사이클을 반환.
function voluntaryCycle(today){
  if(!isFreeWk(dwk(today))) return null;
  for(let i=0;i<CYCLES.length;i++){ const cy=CYCLES[i]; if(dayPages(cy.key)<=0) continue;
    const a=cycleAnchor(cy,today), lastOff=Math.max.apply(null,cy.days.map(x=>x.off)), tS=dstr(today);
    if(tS>=dstr(a)&&tS<=dstr(dadd(a,lastOff))){ const cs=cycleSchedule(cy,today); if(cs.cycleDone<cs.T) return {cy,cs}; }
  }
  return null;
}

// 카피바라 한 마리를 한 단계 악화(healthy→weak→leaving→gone). ST.pond를 변경하고 대상 마리를 반환.
function degradeOne() {
  const order=['healthy','weak','leaving','gone']; let target=null;
  ST.pond=ST.pond.map(c=>{ if(!target&&c.status!=='gone'){target=c;const i=order.indexOf(c.status);return{...c,status:order[Math.min(order.length-1,i+1)]};} return c; });
  return target;
}
// 거른 숙제일(miss) 수만큼 위기를 적용. 난이도에 따라 강도 조절.
function applyMiss(miss) {
  if(miss<=0) return;
  const diff=ST.settings.difficulty||'normal';
  let stages, resetStreak;
  if(diff==='easy'){ stages=1; resetStreak=miss>=2; }
  else if(diff==='firm'){ stages=miss+1; resetStreak=true; }
  else { stages=miss; resetStreak=true; }
  for(let i=0;i<stages;i++) degradeOne();
  if(resetStreak) ST.streak=0;
  const worst=ST.pond.find(c=>c.status!=='healthy');
  if(worst) ST.crisisInfo={uid:worst.uid,name:sp(worst.speciesId).name,story:'며칠 숙제를 못 했더니 친구가 기운을 잃었어요…'};
}
// 날짜가 바뀐 경우: 거른 계획 요일을 집계해 위기 적용, 오늘 진행도 초기화.
function rollover() {
  const todayS=dstr(new Date());
  if(!ST.lastDate){ ST.lastDate=todayS; return; }
  if(ST.lastDate===todayS) return;
  let miss=0, cur=dparse(ST.lastDate);
  // 마지막 활동일부터 오늘 전날까지 훑으며, 그날 마감된 사이클이 미완료면 위기 1회(사이클 단위).
  while(dstr(cur)<todayS){
    CYCLES.forEach(cy=>{
      if(dayPages(cy.key)<=0) return;
      const a=cycleAnchor(cy,cur), lastOff=Math.max.apply(null,cy.days.map(x=>x.off));
      if(dstr(dadd(a,lastOff))===dstr(cur)){ const cs=cycleSchedule(cy,cur); if(cs.cycleDone<cs.T) miss++; }
    });
    cur=dadd(cur,1);
  }
  applyMiss(miss);
  ST.lastDate=todayS;
}

// ── State mutations ──────────────────────────────────────────
function setState(upd) {
  ST = typeof upd==='function' ? {...ST,...upd(ST)} : {...ST,...upd};

}

// 포획 오버레이 닫기: 대기 중인 milestone/rescue 이벤트가 있으면 이어서 보여준다.

function closeEvent() {

function toggleTimer() {

  else{setState(s=>({timerRunning:true,timerSec:s.timerSec>0?s.timerSec:mpp()*60}));}

function completePage() {
  const k=ST.todayKey, planned=schedule().days[k].pages; if(!planned)return;
  const todayS=dstr(new Date()), cur=doneOnDate(k,todayS);
  if(cur>=planned) return; // 이미 끝낸 분량 — 채집 무한반복 방지
  const done=cur+1, dayLog={...ST.dayLog,[k]:{date:todayS,pages:done}};
  if(done>=planned){ ST={...ST,dayLog,timerRunning:false,timerSec:0}; finishDay(); }
  else setState({dayLog,timerRunning:false,timerSec:0,overlay:'break'});
}
// 이벤트 보상 적용: ctx(pond/items/unlocks)를 직접 갱신하고 표시용 eventInfo를 반환.
//  targetUid 지정 시 그 카피바라에게, 아니면 건강한 카피바라 중 랜덤으로 친밀도를 준다.
function applyEventReward(ev, ctx, targetUid) {
  const rw=ev.reward||{}; let who='카피바라';
  if(rw.intimacy){
    const healthy=ctx.pond.filter(c=>c.status==='healthy');
    const t = targetUid ? ctx.pond.find(c=>c.uid===targetUid)
            : (healthy.length?healthy[Math.floor(Math.random()*healthy.length)]:null);
    if(t){ ctx.pond=ctx.pond.map(c=>c.uid===t.uid?{...c,intimacy:(c.intimacy||0)+rw.intimacy}:c); who=sp(t.speciesId).name; }
  }
  if(rw.item) ctx.items={...ctx.items,[rw.item]:(ctx.items[rw.item]||0)+1};
  if(rw.unlock&&ctx.unlocks.indexOf(rw.unlock)<0) ctx.unlocks=[...ctx.unlocks,rw.unlock];
  const guest=rw.guest?GUESTS.find(g=>g.id===rw.guest):null;
  return {ev,who,guest,itemGot:rw.item||null,itemCount:rw.item?ctx.items[rw.item]:0,intimacy:rw.intimacy||0,unlock:rw.unlock||null};
}
// 휴식일 자발 숙제: 한 쪽 미리 풀기 → 사이클 분량 차감(재계산) + 친밀도↑ + 랜덤 이벤트(포획 없음).
function doVoluntary() {
  const today=new Date(), vc=voluntaryCycle(today); if(!vc) return;
  const wk=dwk(today), todayS=dstr(today);
  const dayLog={...ST.dayLog,[wk]:{date:todayS,pages:doneOnDate(wk,todayS)+1}};
  const ev=pickWeighted(eventsBy('voluntary'));
  const ctx={pond:ST.pond,items:ST.items||{},unlocks:ST.unlocks||[]};
  const ei=applyEventReward(ev,ctx);
  ST={...ST,dayLog,pond:ctx.pond,items:ctx.items,unlocks:ctx.unlocks,eventInfo:ei,eventQueue:[],overlay:'event'};
  save(); render();
}
// 도감 상세에서 카피바라에게 직접 해보는 상호작용: 친밀도↑ + 개성별 반응.
function interact(uid, id) {
  const c=ST.pond.find(x=>x.uid===uid), it=INTERACTIONS.find(x=>x.id===id); if(!c||!it) return;
  const personality=sp(c.speciesId).personality;
  const pond=ST.pond.map(x=>x.uid===uid?{...x,intimacy:(x.intimacy||0)+(it.intimacy||1)}:x);
  setState({pond,detailReaction:{emoji:it.emoji,mood:it.mood,line:interactReact(personality,it)}});
}
// 꾸미기: 같은 장식을 다시 누르면 벗고, 다른 장식이면 갈아 끼운다(카피바라당 1개).
function equipDecor(uid, decorId) {
  const cur=(ST.equip||{})[uid];
  const equip={...(ST.equip||{})}; if(cur===decorId) delete equip[uid]; else equip[uid]=decorId;
  setState({equip});
}
function finishDay() {
  const today=new Date();
  // 위기 회복: 건강하지 않은 한 마리를 한 단계 끌어올린다(이전 상태를 기억해 rescue 이벤트 분기).
  const order=['gone','leaving','weak','healthy']; let rescued=null;
  let pond=ST.pond.map(c=>{ if(!rescued&&c.status!=='healthy'){rescued={uid:c.uid,prior:c.status};const i=order.indexOf(c.status);return{...c,status:order[Math.min(order.length-1,i+1)]};} return c; });
  const unseen=SPECIES.filter(s=>!ST.dexSeen[s.id]);
  let species,isNew;
  if(unseen.length){species=unseen[Math.floor(Math.random()*unseen.length)];isNew=true;}
  else{species=SPECIES[Math.floor(Math.random()*SPECIES.length)];isNew=false;}
  if(isNew){pond=[...pond,{uid:'c'+Date.now()+Math.floor(Math.random()*999),speciesId:species.id,status:'healthy',intimacy:0}];}
  else{let b=false;pond=pond.map(c=>{if(!b&&c.speciesId===species.id){b=true;return{...c,intimacy:(c.intimacy||0)+1};}return c;});if(!pond.find(c=>c.speciesId===species.id))pond=[...pond,{uid:'c'+Date.now(),speciesId:species.id,status:'healthy',intimacy:0}];}
  const dexSeen={...ST.dexSeen,[species.id]:true};
  const todayS=dstr(today);
  const incStreak=ST.streakDate!==todayS; // 연속일수는 하루 1회만 증가
  const newStreak=incStreak?ST.streak+1:ST.streak;

  // ── milestone / rescue 이벤트 큐 구성 (caught 오버레이 닫은 뒤 순차 표시) ──
  const ctx={pond,items:ST.items||{},unlocks:ST.unlocks||[]};
  const queue=[]; let fired=ST.milestonesFired||[];
  const pushEvent=(id,targetUid)=>{ const ev=EVENTS.find(e=>e.id===id); if(ev) queue.push(applyEventReward(ev,ctx,targetUid)); };
  // rescue: 위기에서 한 단계 회복했을 때. weak→완쾌(heal), leaving/gone→복귀(back).
  if(rescued) pushEvent(rescued.prior==='weak'?'ev_r_heal':'ev_r_back', rescued.uid);
  // milestone(cycleComplete): 오늘이 속한 사이클이 방금 완주됐고, 그 사이클 인스턴스에서 처음일 때.
  const pf=planForWeekday(ST.todayKey,today);
  if(pf){ const cs2=cycleSchedule(pf.cy,today); if(cs2.cycleDone>=cs2.T){ const ck='cycle:'+pf.cy.key+':'+dstr(cs2.anchor); if(fired.indexOf(ck)<0){ pushEvent('ev_m_cycle'); fired=[...fired,ck]; } } }
  // milestone(streak): 연속일수가 7·14에 도달하는 순간(증가한 날만).
  if(incStreak){ if(newStreak===7) pushEvent('ev_m_streak7'); if(newStreak===14) pushEvent('ev_m_streak14'); }
  // milestone(dexPct): 도감 완성도가 50%를 처음 넘는 순간.
  const dexTotal=SPECIES.length;
  const oldPct=Math.round(Object.keys(ST.dexSeen).filter(k=>ST.dexSeen[k]).length/dexTotal*100);
  const newPct=Math.round(Object.keys(dexSeen).filter(k=>dexSeen[k]).length/dexTotal*100);
  if(oldPct<50&&newPct>=50) pushEvent('ev_m_dexHalf');

  ST={...ST,pond:ctx.pond,items:ctx.items,unlocks:ctx.unlocks,dexSeen,streak:newStreak,streakDate:todayS,milestonesFired:fired,caughtSpecies:species,caughtNew:isNew,overlay:'caught',eventQueue:queue,crisisInfo:anyCrisis(ctx.pond)?ST.crisisInfo:null};
  save(); render();
}
function skipDay() {
  const stories=['게으름 바이러스에 살짝 감염됐어!','미루기 마왕이 데려가려 해!','너무 심심해서 깊은 잠에 빠졌어…','연못 밖에서 길을 잃었대!'];

}

// ── Render ───────────────────────────────────────────────────
function render() {
  const T=THEMES[ST.theme]||THEMES.onsen;
  const sch=schedule(), tk=ST.todayKey;
  const plannedToday=sch.days[tk]?sch.days[tk].pages:0;
  const doneToday=doneForDay(tk);
  const allDone=plannedToday>0&&doneToday>=plannedToday;
  const dexTotal=SPECIES.length, dexSeenCount=SPECIES.filter(s=>ST.dexSeen[s.id]).length;
  const dexPct=Math.round((dexSeenCount/dexTotal)*100);
  const now=new Date(), wd=['일','월','화','수','목','금','토'][now.getDay()];
  const dateLabel=(now.getMonth()+1)+'월 '+now.getDate()+'일 '+wd+'요일';
  const cheerCandidates=ST.pond.filter(c=>c.status==='healthy');

// ── Screen renderers ─────────────────────────────────────────
function renderHome(T,sch,dexPct,dateLabel,planned,done,allDone) {
  const lilyPads=[{l:8,t:24,s:54,h:30,c:'#86b89f',d:5},{l:60,t:16,s:70,h:38,c:'#7fae97',d:6},{l:78,t:78,s:60,h:34,c:'#8cbfa4',d:5.5},{l:30,t:86,s:48,h:26,c:'#79a890',d:4.5}];
  const lilies=lilyPads.map(p=>`<div style="position:absolute;left:${p.l}%;top:${p.t}%;width:${p.s}px;height:${p.h}px;background:${p.c};border-radius:50%;opacity:0.5;animation:lilyDrift ${p.d}s ease-in-out infinite;"></div>`).join('');
  const pond=ST.pond.map((c,i)=>{
    const s=sp(c.speciesId), slot=POND_SLOTS[i%POND_SLOTS.length], sz=Math.round(64+(slot[1]/100)*30);
    return `<div onclick="openDetail('${s.id}')" class="tapbtn" style="position:absolute;left:${slot[0]}%;top:${slot[1]}%;transform:translate(-50%,-50%);z-index:${Math.round(slot[1])};cursor:pointer;">${capy({size:sz,color:s.color,accessory:s.accessory,idle:c.status==='gone'?'none':s.idle,status:c.status,rarity:s.rarity,personality:s.personality,decor:decorFor(c.uid)})}</div>`;
  }).join('');
  const progPct=planned>0?Math.round((done/planned)*100):(planned===0?100:0);
  const progLabel=planned===0?'푹 쉬는 날':(done+' / '+planned+'쪽 완료');
  const headline=planned===0?'오늘은 숙제가 없어요 🌿':(allDone?'오늘 숙제 끝! 잘했어 🎉':'오늘 '+planned+'쪽이 있어요');
  return `<div>
  <div style="position:relative;isolation:isolate;height:46dvh;min-height:340px;border-radius:30px;background:${T.water};overflow:hidden;box-shadow:inset 0 -10px 30px rgba(0,0,0,0.05),0 8px 22px rgba(0,0,0,0.06);">
    <div style="position:absolute;top:14px;left:14px;right:14px;display:flex;gap:8px;flex-wrap:wrap;z-index:90;">
      <div style="background:rgba(255,255,255,0.82);backdrop-filter:blur(4px);padding:7px 13px;border-radius:999px;font-weight:700;font-size:14px;">🦫 채집 ${ST.pond.length}마리</div>
      <div style="background:rgba(255,255,255,0.82);backdrop-filter:blur(4px);padding:7px 13px;border-radius:999px;font-weight:700;font-size:14px;">📚 도감 ${dexPct}%</div>
      <div style="background:rgba(255,255,255,0.82);backdrop-filter:blur(4px);padding:7px 13px;border-radius:999px;font-weight:700;font-size:14px;">🔥 ${ST.streak}일 연속</div>
    </div>
    ${lilies}${pond}
    ${!ST.pond.length?`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${T.sub};font-weight:600;"><div style="font-family:'Gaegu',cursive;font-size:24px;color:${T.ink};">아직 연못이 조용해요</div><div style="font-size:14px;margin-top:4px;">오늘 숙제를 끝내고 첫 친구를 데려오자!</div></div>`:''}
  </div>
  <div style="margin-top:16px;background:${T.card};border:2px solid ${T.line};border-radius:24px;padding:18px 20px;box-shadow:0 6px 16px rgba(0,0,0,0.04);">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">
      <div>
        <div style="font-size:14px;color:${T.sub};font-weight:600;">${dateLabel}</div>
        <div style="font-family:'Gaegu',cursive;font-size:28px;font-weight:700;margin-top:2px;">${headline}</div>
      </div>
      <div onclick="setState({screen:'today',overlay:null})" class="tapbtn" style="cursor:pointer;background:${T.accent};color:#fff;font-weight:800;font-size:17px;padding:15px 26px;border-radius:18px;box-shadow:0 5px 0 ${T.accentDark};">오늘의 숙제 하기 →</div>
    </div>
    <div style="margin-top:14px;height:16px;background:${T.soft};border-radius:999px;overflow:hidden;">
      <div style="height:100%;width:${progPct}%;background:${T.accent};border-radius:999px;transition:width 0.4s ease;"></div>
    </div>
    <div style="margin-top:8px;font-size:13px;color:${T.sub};font-weight:600;">${progLabel}</div>
  </div>
</div>`;
}

function renderSetup(T,sch) {
  const day=ST.setupDay;
  const daySel=[{k:'tue',l:'화요일'},{k:'thu',l:'목요일'}].map(x=>{ const sel=day===x.k; return `<div onclick="setState({setupDay:'${x.k}'})" class="tapbtn" style="cursor:pointer;flex:1;text-align:center;font-weight:800;font-size:14px;padding:9px;border-radius:11px;background:${sel?T.accent:T.soft};color:${sel?'#fff':T.ink};border:2px solid ${sel?T.accent:T.line};">${x.l}</div>`; }).join('');

  const rows=ST.workbooks.map(w=>{
    const key=day+'|'+w.id, a=getAssign(day,w.id), editing=!a||(key in ST.rowEdit), ev=ST.rowEdit[key]||{};
    const dot=`<span style="width:13px;height:13px;border-radius:50%;background:${w.color};flex:none;"></span>`;
    if(editing){
      const f=parseInt(ev.from),t=parseInt(ev.to), pg=(!isNaN(f)&&!isNaN(t))?(t-f+1):null;
      const pgLabel=pg!=null&&pg>0?pg+'쪽':(pg!=null?'확인!':'');
      return `<div style="display:flex;align-items:center;gap:6px;background:${T.soft};border-radius:13px;padding:10px 11px;margin-bottom:8px;flex-wrap:wrap;">
        ${dot}<span style="font-weight:700;font-size:14px;max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(w.name)}</span>
        <input data-row-from="${key}" type="number" inputmode="numeric" placeholder="시작" value="${h(ev.from||'')}" style="width:54px;font-size:15px;text-align:center;border:2px solid ${T.line};border-radius:9px;padding:8px 3px;background:#fff;color:${T.ink};" />
        <span style="color:${T.sub};font-weight:700;">~</span>
        <input data-row-to="${key}" type="number" inputmode="numeric" placeholder="끝" value="${h(ev.to||'')}" style="width:54px;font-size:15px;text-align:center;border:2px solid ${T.line};border-radius:9px;padding:8px 3px;background:#fff;color:${T.ink};" />
        <span style="color:${T.sub};font-weight:600;font-size:13px;">쪽</span>
        <span id="rowpg-${key}" style="font-weight:800;color:${T.accent};font-size:13px;min-width:28px;">${pgLabel}</span>
        <div onclick="confirmRow('${day}','${w.id}')" class="tapbtn" style="cursor:pointer;margin-left:auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:${T.accent};color:#fff;font-weight:800;font-size:18px;border-radius:11px;">✓</div>
      </div>`;
    }
    const pg=Math.max(0,a.to-a.from+1);
    return `<div style="display:flex;align-items:center;gap:9px;background:${lighten(T.accent,0.86)};border:2px solid ${lighten(T.accent,0.62)};border-radius:13px;padding:11px 13px;margin-bottom:8px;">
      ${dot}<span style="font-weight:700;font-size:15px;">${h(w.name)}</span>
      <span style="color:${T.sub};font-weight:600;font-size:14px;">p.${a.from}~${a.to}</span>
      <span style="font-weight:800;color:${T.accentDark};font-size:14px;">${pg}쪽</span>
      <div onclick="editRow('${day}','${w.id}')" class="tapbtn" style="cursor:pointer;margin-left:auto;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px;font-size:14px;">✏️</div>
      <div onclick="clearRow('${day}','${w.id}')" class="tapbtn" style="cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px;color:${T.sub};font-size:14px;">✕</div>
    </div>`;
  }).join('');
  const noWb=!ST.workbooks.length?`<div style="color:${T.sub};font-size:14px;padding:8px 2px;">문제집이 없어요. ⚙️ 설정 → 📒 문제집 관리에서 먼저 추가해 주세요.</div>`:'';

  const today=new Date();
  const cyclePreview=CYCLES.map(cy=>{
    const cs=cycleSchedule(cy,today), active=cs.T>0;
    const dayRows=cs.rows.map(r=>{
      let dots='';
      for(let i=0;i<r.required;i++){ const filled=i<r.done; dots+=`<span style="width:11px;height:11px;border-radius:50%;flex:none;background:${filled?T.accent:'transparent'};border:2px solid ${filled?T.accent:lighten(T.accent,0.5)};"></span>`; }
      if(!r.required) dots=`<span style="font-size:12px;color:${T.sub};">–</span>`;
      return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">
        <div style="width:30px;text-align:center;font-weight:800;font-size:14px;color:${r.isToday?T.accentDark:T.sub};">${DL[r.wk]}${r.isToday?`<div style="font-size:9px;font-weight:700;color:${T.accent};line-height:1;">오늘</div>`:''}</div>
        <div style="flex:1;display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:15px;">${dots}</div>
        <div style="font-size:12px;font-weight:700;color:${T.sub};width:42px;text-align:right;">${r.required?r.done+'/'+r.required:'–'}</div>
      </div>`;
    }).join('');
    const volNote=cs.voluntaryDone>0?`<div style="font-size:11.5px;color:${T.accentDark};font-weight:700;margin-bottom:8px;">🌟 미리 푼 ${cs.voluntaryDone}쪽이 반영돼 분량이 줄었어요</div>`:'';
    return `<div style="background:${active?T.soft:'transparent'};border:2px solid ${active?'transparent':T.line};border-radius:16px;padding:13px 14px;margin-bottom:10px;opacity:${active?1:0.55};">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;">
        <div style="font-weight:800;font-size:14px;">${cy.label} <span style="font-weight:600;color:${T.sub};font-size:12px;">(${cy.days.map(x=>DL[x.d]).join('·')})</span></div>
        <div style="font-weight:800;color:${active?T.accent:T.sub};font-size:13px;">${active?cs.cycleDone+' / '+cs.T+'쪽':'숙제 없음'}</div>
      </div>
      ${volNote}${dayRows}
    </div>`;
  }).join('');

  return `<div>
  <div style="font-family:'Gaegu',cursive;font-size:26px;font-weight:700;margin:4px 2px 12px;">✏️ 숙제 설정</div>
  <div style="background:${T.card};border:2px solid ${T.line};border-radius:22px;padding:16px 18px;margin-bottom:16px;">
    <div style="font-weight:800;font-size:16px;margin-bottom:4px;">🗓️ 숙제 입력</div>
    <div style="font-size:13px;color:${T.sub};margin-bottom:12px;">요일을 고르고, 문제집마다 시작·끝 쪽을 넣고 ✓를 누르면 확정돼요.</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;max-width:230px;">${daySel}</div>
    ${rows}${noWb}
  </div>
  <div style="background:${T.card};border:2px solid ${T.line};border-radius:22px;padding:16px 18px;margin-bottom:8px;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;">
      <div style="font-weight:800;font-size:16px;">📊 주간 배분 미리보기</div>
      <div style="font-weight:800;color:${T.accent};font-size:15px;">총 ${sch.weekTotal}쪽</div>
    </div>
    <div style="font-size:12.5px;color:${T.sub};margin:4px 0 14px;">화 숙제는 수·목, 목 숙제는 금·토·월에 나눠 담아요 (1쪽 ≈ ${mpp()}분). ● 완료 / ○ 남음</div>
    ${cyclePreview}
  </div>
</div>`;
}

function renderToday(T,sch,tk,planned,done,allDone,cheerSp,timerMin,timerSec) {
  const daySel=['mon','tue','wed','thu','fri','sat'].map(d=>{ const sel=d===tk,pg=sch.days[d].pages; return `<div onclick="setState({todayKey:'${d}',timerRunning:false,timerSec:0})" class="tapbtn" style="cursor:pointer;flex:1;min-width:48px;text-align:center;font-weight:800;font-size:15px;padding:11px 0;border-radius:13px;background:${sel?T.accent:T.card};color:${sel?'#fff':(pg>0?T.ink:T.sub)};border:2px solid ${sel?T.accent:T.line};">${DL[d]}<div style="font-size:11px;font-weight:600;margin-top:2px;opacity:0.85;">${pg>0?pg+'쪽':'휴식'}</div></div>`; }).join('');

  const tokens=[];
  for(let i=0;i<planned;i++){ const d=i<done; tokens.push(`<div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;background:${d?T.accent:T.soft};color:${d?'#fff':T.sub};border:2px solid ${d?T.accent:T.line};">${d?'✓':(i+1)}</div>`); }

  const todayWk=dwk(new Date()), vcToday=(tk===todayWk)?voluntaryCycle(new Date()):null;
  const volDoneToday=vcToday?doneOnDate(todayWk,dstr(new Date())):0;
  const napCard=`<div style="background:${T.card};border:2px solid ${T.line};border-radius:26px;padding:36px 22px;text-align:center;"><div style="display:flex;justify-content:center;margin-bottom:8px;">${capy({size:82,color:cheerSp.color,accessory:'💤',idle:'nap',status:'healthy',rarity:'일반'})}</div><div style="font-family:'Gaegu',cursive;font-size:24px;font-weight:700;">오늘은 숙제가 없는 날이에요</div><div style="font-size:14px;color:${T.sub};margin-top:4px;">푹 쉬어도 좋아요. 다른 요일을 눌러 미리 둘러볼 수도 있어요!</div></div>`;
  const restCard=vcToday?`<div style="background:${T.card};border:2px solid ${T.line};border-radius:26px;padding:26px 22px;text-align:center;box-shadow:0 6px 16px rgba(0,0,0,0.04);">
    <div style="display:flex;justify-content:center;margin-bottom:6px;">${capy({size:78,color:cheerSp.color,accessory:cheerSp.accessory,idle:'bob',status:'healthy',rarity:cheerSp.rarity,personality:cheerSp.personality,mood:allDone?'뿌듯':null})}</div>
    <div style="font-family:'Gaegu',cursive;font-size:23px;font-weight:700;">오늘은 쉬는 날이에요 🌿</div>
    <div style="font-size:13.5px;color:${T.sub};margin-top:4px;line-height:1.5;">그래도 미리 풀고 싶다면 <b style="color:${T.accentDark};">${vcToday.cy.label}</b>를 당겨서 할 수 있어요.<br>미리 하면 친밀도가 오르고 즐거운 일이 생겨요!</div>
    <div style="margin:14px 0 4px;font-size:13px;color:${T.sub};font-weight:700;">오늘 미리 푼 양 <span style="color:${T.accent};">${volDoneToday}쪽</span> · 사이클 남은 <span style="color:${T.accent};">${Math.max(0,vcToday.cs.T-vcToday.cs.cycleDone)}쪽</span></div>
    <div onclick="doVoluntary()" class="tapbtn" style="cursor:pointer;text-align:center;background:${T.accent};color:#fff;font-weight:800;font-size:17px;padding:16px;border-radius:18px;box-shadow:0 5px 0 ${T.accentDark};margin-top:8px;">한 쪽 미리 풀기 ✏️</div>
  </div>`:napCard;
  const body=planned>0?`<div style="background:${T.card};border:2px solid ${T.line};border-radius:26px;padding:22px;box-shadow:0 6px 16px rgba(0,0,0,0.04);">
    <div style="display:flex;align-items:flex-start;gap:14px;">
      <div style="flex:none;margin-top:-4px;">${capy({size:70,color:cheerSp.color,accessory:cheerSp.accessory,idle:'bob',status:'healthy',rarity:cheerSp.rarity,personality:cheerSp.personality,mood:allDone?'뿌듯':null})}</div>
      <div style="flex:1;background:${T.soft};border-radius:16px;padding:13px 16px;font-weight:600;font-size:15px;line-height:1.5;">${allDone?'인우야, 오늘 다 해냈어! 새 친구를 데려가자 🎉':h(cheerSp.line)}</div>
    </div>
    <div style="text-align:center;margin:22px 0 6px;">
      <div style="font-size:14px;color:${T.sub};font-weight:600;">${allDone?'오늘 분량 완료!':(planned+'쪽 중 '+(done+1)+'쪽째')}</div>
      <div id="timer-display" style="font-family:'Gaegu',cursive;font-size:64px;font-weight:700;color:${T.accent};line-height:1;margin-top:4px;">${timerMin}:${timerSec}</div>

    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin:14px 0 18px;">
      <div onclick="toggleTimer()" class="tapbtn" style="cursor:pointer;padding:12px 24px;border-radius:14px;font-weight:800;font-size:15px;background:${T.soft};color:${T.ink};border:2px solid ${T.line};">${ST.timerRunning?'⏸ 잠깐 멈춤':'▶ 타이머 시작'}</div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;">${tokens.join('')}</div>
    ${allDone?`<div style="text-align:center;background:#6aa05a;color:#fff;font-weight:800;font-size:18px;padding:17px;border-radius:18px;box-shadow:0 5px 0 #558044;">오늘 숙제 끝! 잘했어요 🎉</div>`:`<div onclick="completePage()" class="tapbtn" style="cursor:pointer;text-align:center;background:${T.accent};color:#fff;font-weight:800;font-size:18px;padding:17px;border-radius:18px;box-shadow:0 5px 0 ${T.accentDark};">이 쪽 다 풀었어요 ✓</div>`}
  </div>`:restCard;

  return `<div><div style="font-family:'Gaegu',cursive;font-size:26px;font-weight:700;margin:4px 2px 12px;">📖 오늘의 숙제</div><div style="display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;">${daySel}</div>${body}</div>`;

      <div style="font-weight:800;font-size:15px;margin-bottom:4px;">⏱️ 1쪽당 예상 시간</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <input data-mpp="1" type="number" inputmode="numeric" value="${ST.settings.minsPerPage}" style="width:90px;font-size:16px;text-align:center;border:2px solid ${T.line};border-radius:12px;padding:11px;background:#fff;color:${T.ink};" />
        <span style="color:${T.sub};font-weight:600;">분 / 쪽</span>
      </div>
    </div>
    <div style="background:${T.card};border:2px solid ${T.line};border-radius:20px;padding:16px 18px;margin-bottom:14px;">
      <div style="font-weight:800;font-size:15px;margin-bottom:10px;">🗓️ 요일별 최대 숙제 시간 (분)</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">${dayMinInputs}</div>
      <div style="font-size:12px;color:${T.sub};margin-top:8px;">일요일은 휴무예요.</div>
    </div>
    <div style="background:${T.card};border:2px solid ${T.line};border-radius:20px;padding:16px 18px;margin-bottom:14px;">
      <div style="font-weight:800;font-size:15px;margin-bottom:6px;">🌱 위기 난이도</div>
      <div style="font-size:12.5px;color:${T.sub};margin-bottom:10px;">영구 상실은 없어요. 숙제로 항상 되찾을 수 있습니다.</div>
      <div style="display:flex;gap:8px;">${diffBtns}</div>
    </div>
    <div onclick="demoCrisis()" class="tapbtn" style="cursor:pointer;text-align:center;background:#fff1ec;color:#c0503a;border:2px solid #f3c4b8;font-weight:800;font-size:14px;padding:13px;border-radius:14px;margin-bottom:10px;">🧪 (데모) 숙제 거른 날 만들기 — 위기 연출 보기</div>
    <div onclick="resetAll()" class="tapbtn" style="cursor:pointer;text-align:center;color:${T.sub};font-weight:700;font-size:13px;padding:10px;">전체 초기화</div>
  </div></div>`;
}

// ── Input attachment ─────────────────────────────────────────
function attachInputs() {
  document.querySelectorAll('[data-wb-rename]').forEach(el=>{
    el.addEventListener('input',e=>{ const id=el.getAttribute('data-wb-rename'); ST.workbooks=ST.workbooks.map(w=>w.id===id?{...w,name:e.target.value}:w); save(); });
  });
  const nwb=document.querySelector('[data-new-wb]');
  if(nwb) nwb.addEventListener('input',e=>{ST.newWbName=e.target.value;});

  function updateRowPg(key){ const d=ST.rowEdit[key]||{}; const f=parseInt(d.from),t=parseInt(d.to); const pg=(!isNaN(f)&&!isNaN(t))?(t-f+1):null; const el=document.getElementById('rowpg-'+key); if(el)el.textContent=pg!=null&&pg>0?pg+'쪽':(pg!=null?'확인!':''); }
  document.querySelectorAll('[data-row-from]').forEach(el=>{
    el.addEventListener('input',e=>{ const key=el.getAttribute('data-row-from'); ST.rowEdit={...ST.rowEdit,[key]:{...(ST.rowEdit[key]||{}),from:e.target.value}}; updateRowPg(key); });
  });
  document.querySelectorAll('[data-row-to]').forEach(el=>{
    el.addEventListener('input',e=>{ const key=el.getAttribute('data-row-to'); ST.rowEdit={...ST.rowEdit,[key]:{...(ST.rowEdit[key]||{}),to:e.target.value}}; updateRowPg(key); });
  });

  const mppEl=document.querySelector('[data-mpp]');
  if(mppEl)mppEl.addEventListener('input',e=>setMpp(e.target.value));

  document.querySelectorAll('[data-daymin]').forEach(el=>{
    el.addEventListener('input',e=>setDayMin(el.getAttribute('data-daymin'),e.target.value));
  });
}

// ── Init ─────────────────────────────────────────────────────
load();
render();
startTick();
</script>
</body>
</html>
